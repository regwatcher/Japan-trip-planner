kind = "web"
previewPath = "/"
title = "Japan Trip Planner"
version = "1.0.0"
id = "artifacts/japan-trip"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24142

[services.development]
run = "pnpm --filter @workspace/japan-trip run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/japan-trip", "run", "build" ]
publicDir = "artifacts/japan-trip/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24142"
BASE_PATH = "/"
